name: CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Security Audit (Bandit)
      run: |
        bandit -r app/ -f txt

    - name: Run Unit Tests and Check Coverage (>= 80%)
      run: |
        pytest --cov=app --cov-fail-under=80 tests/test_unit.py

    - name: Run Integration Tests and Generate JUnit XML
      run: |
        pytest --junitxml=reports/junit.xml tests/test_integration.py

    - name: Archive Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          reports/
        if-no-files-found: ignore
